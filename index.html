            <span class="totals-chip chip-diff" id="chipDiff">

          <div id="entryTemplateMenu" class="hidden"></div>

  <script>
    document.querySelectorAll('.menu-trigger').forEach(trigger => {
      trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        const dd = trigger.nextElementSibling;
        if (dd && dd.classList.contains('menu-dropdown')) {
          document.querySelectorAll('.menu-dropdown').forEach(d => d.classList.add('hidden'));
          dd.classList.toggle('hidden');
        }
      });
    });
    document.addEventListener('click', (e) => {
      if (e.target.closest('.menu-wrap')) return;
      document.querySelectorAll('.menu-dropdown').forEach(d => d.classList.add('hidden'));
    });
    document.getElementById('btnSearchClose').addEventListener('click', () => {
      TilitinApp.closeSearch();
    });
    TilitinApp.init();
  </script>
